name: Advanced CI/CD Pipeline (Lab 5)

on:
  push:
    branches: [ main, dev ] # Підтримка Git Flow
  workflow_dispatch: # Підтримка ручного запуску

jobs:
  sast-analysis:
    name: SAST (Security Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Static Code Analysis
        run: echo "Running SAST analysis..." && sleep 2 && echo "No vulnerabilities found."

  build-and-registry:
    name: Build & Push to Registry
    runs-on: ubuntu-latest
    needs: sast-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Compile Project
        run: dotnet build src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj -c Release
      - name: Push Container to Registry
        run: echo "Successfully pushed to Container Registry"

  deploy-dev:
    name: Deploy to DEV Server
    runs-on: ubuntu-latest
    needs: build-and-registry
    if: github.ref == 'refs/heads/dev' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy to VPS
        run: echo "Deploying to DEV environment..."

  deploy-prod:
    name: Deploy to MAIN (Prod)
    runs-on: ubuntu-latest
    needs: build-and-registry
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Kubernetes
        run: echo "Deploying to Production cluster..."
