syntax = "proto3";

option csharp_namespace = "DevOpsProject.Shared.Grpc";

package shared;

import "network-status.proto";
import "result.proto";
import "location.proto";
import "drone-telemetry.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

service DroneService
{
  rpc Ping (PingRequest) returns (PingResponse);
  rpc ConnectDrone (ConnectDroneRequest) returns (ConnectDroneResponse);
  rpc DisconnectDrone (DisconnectDroneRequest) returns (DisconnectDroneResponse);
  rpc Move (MoveRequest) returns (MoveResponse);
  rpc Stop (StopRequest) returns (StopResponse);
  rpc SimulateBadConnection (SimulateBadConnectionRequest) returns (SimulateBadConnectionResponse);
  rpc StopBadConnectionSimulation (StopBadConnectionSimulationRequest) returns (StopBadConnectionSimulationResponse);
  rpc ConnectHive (ConnectHiveRequest) returns (ConnectHiveResponse);
  rpc DisconnectHive (DisconnectHiveRequest) returns (DisconnectHiveResponse);
  rpc SimulateBadDevice (SimulateBadDeviceRequest) returns (SimulateBadDeviceResponse);
  rpc StopBadDeviceSimulation (StopBadDeviceSimulationRequest) returns (StopBadDeviceSimulationResponse);
}

message PingRequest
{
  
}

message PingResponse
{
  string id = 1;
  ConnectionType type = 2;
  string ipAddress = 3;
  int32 http1Port = 4;
  int32 grpcPort = 5;
  int32 udpPort = 6;
  google.protobuf.Timestamp timestamp = 7;
  Location location = 8;
  float speed = 9;
  float height = 10;
  DroneType droneType = 11;
  DroneState state = 12;
  Location destination = 13;
}

message ConnectDroneRequest
{
  string id = 1;
  string ipAddress = 2;
  int32 http1Port = 3;
  int32 grpcPort = 4;
  int32 udpPort = 5;
  repeated ForeignConnection connections = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message ConnectDroneResponse
{
    Result result = 1;
}

message DisconnectDroneRequest
{
  string id = 1;
}

message DisconnectDroneResponse
{
  Result result = 1;
}

message MoveRequest
{
  Location destination = 1;
}

message MoveResponse
{
  Result result = 1;
}

message StopRequest
{
  
}

message StopResponse
{
  Result result = 1;
}

message SimulateBadConnectionRequest
{
  string connectionName = 1;
  google.protobuf.Duration duration = 2;
  google.protobuf.Duration latency = 3;
}

message SimulateBadConnectionResponse
{
  Result result = 1;
}

message StopBadConnectionSimulationRequest
{
  string connectionName = 1;
}

message StopBadConnectionSimulationResponse
{
  Result result = 1;
}

message ConnectHiveRequest
{
  string id = 1;
  string ipAddress = 2;
  int32 http1Port = 3;
  int32 grpcPort = 4;
  int32 udpPort = 5;
  repeated ForeignConnection connections = 6;
  google.protobuf.Timestamp timestamp = 7;
  repeated ConnectDroneRequest drones = 8;
}

message ConnectHiveResponse
{
  Result result = 1;
}

message DisconnectHiveRequest
{
  string id = 1;
  repeated string droneIds = 2;
}

message DisconnectHiveResponse
{
  Result result = 1;
}

message SimulateBadDeviceRequest
{
  google.protobuf.Duration duration = 1;
  google.protobuf.Duration latency = 2;
}

message SimulateBadDeviceResponse
{
  Result result = 1;
}

message StopBadDeviceSimulationRequest
{

}

message StopBadDeviceSimulationResponse
{
  Result result = 1;
}
