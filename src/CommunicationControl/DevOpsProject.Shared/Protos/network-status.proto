syntax = "proto3";

option csharp_namespace = "DevOpsProject.Shared.Grpc";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

package shared;

message NetworkStatus
{
  string id = 1;
  ConnectionType type = 2;
  string ipAddress = 3;
  int32 http1Port = 4;
  int32 grpcPort = 5;
  int32 udpPort = 6;
  repeated string aliveConnectionNames = 7;
  google.protobuf.Timestamp sentAt = 8;
  google.protobuf.StringValue udpDest = 9;
}

enum ConnectionType
{
  ConnectionType_Undefined = 0;
  ConnectionType_HiveMind = 1;
  ConnectionType_Drone = 2;
}
